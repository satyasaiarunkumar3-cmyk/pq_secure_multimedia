<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px;
}

button {
    background: #ff758c;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
}

a {
    display: block;
    margin-top: 10px;
    font-size: 14px;
}

.error {
    color: red;
    font-size: 13px;
}

.success {
    color: green;
    font-size: 13px;
}
</style>

</head>

<body>

<div class="box">
    <h2>Create Account</h2>

    <!-- 🔥 Error / Success Messages -->
    {% if error %}
        <div class="error">{{error}}</div>
    {% endif %}

    {% if success %}
        <div class="success">{{success}}</div>
    {% endif %}

    <form method="POST" action="/register" onsubmit="return validate()">

        <input name="username" id="username" placeholder="Username" required>

        <input name="password" id="password" type="password" placeholder="Password" required>

        <input id="confirm" type="password" placeholder="Confirm Password" required>

        <label style="font-size:12px;">
            <input type="checkbox" onclick="toggle()"> Show Password
        </label>

        <div id="msg" class="error"></div>

        <button type="submit">Register</button>
    </form>

    <a href="/">Already have an account? Login</a>
</div>

<script>
function toggle(){
    let p = document.getElementById("password");
    let c = document.getElementById("confirm");

    p.type = p.type === "password" ? "text" : "password";
    c.type = c.type === "password" ? "text" : "password";
}

function validate(){
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    let msg = document.getElementById("msg");

    if(pass.length < 4){
        msg.innerText = "Password must be at least 4 characters";
        return false;
    }

    if(pass !== confirm){
        msg.innerText = "Passwords do not match";
        return false;
    }

    msg.innerText = "";
    return true;
}
</script>

</body>
</html>
